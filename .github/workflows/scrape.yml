name: 🏊 Scrape UMD Hours (Every 12h)

on:
  schedule:
    - cron: '0 2,14 * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install --quiet requests beautifulsoup4

      - run: python scrape.py

      - name: Push updated data.json
        run: |
          git config user.name "UMD Hours Bot"
          git config user.email "bot@umd-hours.github.io"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "📊 Auto-update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - id: deploy
        uses: actions/deploy-pages@v4
