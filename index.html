<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMD 开放时间 · UMD Hours</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="header">
    <h1>🏊 UMD 设施开放时间</h1>
    <p class="subtitle">UMD Facility Hours · 每 12h 自动更新 · Auto-updated every 12h</p>
  </header>

  <!-- Meta -->
  <div class="meta" id="meta"></div>

  <!-- Tabs: 食堂 → 游泳馆 → 咖啡厅 → Stamp -->
  <nav class="tabs" id="tabs">
    <button class="tab active" data-tab="dining">🍽️ 食堂<br><small>Dining Halls</small></button>
    <button class="tab" data-tab="natatorium">🏊 游泳馆<br><small>Natatorium</small></button>
    <button class="tab" data-tab="cafes">☕ 咖啡厅<br><small>Cafes</small></button>
    <button class="tab" data-tab="stamp">🏛️ Stamp<br><small>Stamp Dining</small></button>
  </nav>

  <!-- ═══ Tab: Dining Halls ═══ -->
  <section class="tab-panel active" id="panel-dining">
    <div id="dining-content"></div>
  </section>

  <!-- ═══ Tab: Natatorium ═══ -->
  <section class="tab-panel" id="panel-natatorium">
    <div id="natatorium-content"></div>
  </section>

  <!-- ═══ Tab: Cafes ═══ -->
  <section class="tab-panel" id="panel-cafes">
    <div id="cafes-content"></div>
  </section>

  <!-- ═══ Tab: Stamp ═══ -->
  <section class="tab-panel" id="panel-stamp">
    <div id="stamp-content"></div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>📡 数据来源 Sources:
      <a href="https://dining.umd.edu/hours-locations/dining-halls" target="_blank">Dining</a> ·
      <a href="https://recwell.umd.edu/facility-alerts" target="_blank">RecWell</a> ·
      <a href="https://dining.umd.edu/hours-locations/dining-stamp" target="_blank">Stamp</a>
    </p>
    <p>🤖 每 12h 自动更新 · <a href="https://github.com/jiarjiar/umd-hours" target="_blank">GitHub</a></p>
  </footer>
</div>

<script>
// ─── Tab switching ───
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
});

// ─── Data loading ───
async function loadData() {
  try {
    const resp = await fetch('data.json?v=' + Date.now());
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.body.innerHTML = `<div class="container"><div class="error">❌ 数据加载失败 / Failed to load data.<br>${e.message}</div></div>`;
  }
}

function render(data) {
  document.getElementById('meta').innerHTML =
    `<span>🕐 更新于 Updated: ${data.generated_at_readable || data.generated_at}</span>
     <span class="week-badge">📅 ${data.week_dates?.[0]?.date || ''} ~ ${data.week_dates?.[6]?.date || ''}</span>`;

  renderNatatorium(data.natatorium);
  renderDining(data.dining_halls);
  renderCafes(data.cafes);
  renderStamp(data.stamp);
}

// ─── Natatorium: weekly view ───
function renderNatatorium(nat) {
  const el = document.getElementById('natatorium-content');
  if (!nat) { el.innerHTML = ''; return; }

  let html = '<div class="card"><h2>🏊 Natatorium 游泳馆 / Outdoor Aquatic Center</h2>';

  if (nat.alerts?.length)
    html += nat.alerts.map(a => `<div class="alert-banner">⚠️ ${a}</div>`).join('');

  if (nat.weekly_hours?.length) {
    // Split into weeks
    const week1 = nat.weekly_hours.filter(d => d.week_number === 1);
    const week2 = nat.weekly_hours.filter(d => d.week_number === 2);

    const weekLabel = (label, days) => {
      const start = days[0]?.date.slice(5);
      const end = days[6]?.date.slice(5);
      return `<div class="week-label">📅 ${label}: ${start} ~ ${end}</div>`;
    };

    const dayCN = {Mon:'周一 Mon',Tue:'周二 Tue',Wed:'周三 Wed',Thu:'周四 Thu',Fri:'周五 Fri',Sat:'周六 Sat',Sun:'周日 Sun'};
    const tableRows = (days) => days.map(d => {
      const natC = d.natatorium.toLowerCase() === 'closed' ? 'td-closed' : 'td-open';
      const oacC = d.outdoor_aquatic.toLowerCase() === 'closed' ? 'td-closed' : 'td-open';
      const natI = d.natatorium.toLowerCase() === 'closed' ? '❌' : '✅';
      const oacI = d.outdoor_aquatic.toLowerCase() === 'closed' ? '❌' : '✅';
      return `<tr>
        <td class="facility-name">${dayCN[d.day] || d.day}<br><small>${d.date.slice(5)}</small></td>
        <td class="${natC}">${natI} ${d.natatorium}</td>
        <td class="${oacC}">${oacI} ${d.outdoor_aquatic}</td>
      </tr>`;
    }).join('');

    const thead = `<thead><tr>
      <th>日期 Day</th>
      <th>🏊 Natatorium<br><small>游泳馆</small></th>
      <th>🏖️ Outdoor Aquatic Center<br><small>室外水上中心</small></th>
    </tr></thead>`;

    html += weekLabel('本周 This Week', week1);
    html += `<div class="table-wrapper"><table class="hours-table weekly">${thead}<tbody>${tableRows(week1)}</tbody></table></div>`;
    html += weekLabel('下周 Next Week', week2);
    html += `<div class="table-wrapper"><table class="hours-table weekly">${thead}<tbody>${tableRows(week2)}</tbody></table></div>`;
  }

  if (nat.regular_hours_note)
    html += `<p class="note-text">💡 ${nat.regular_hours_note}</p>`;

  html += '</div>';
  el.innerHTML = html;
}

// ─── Dining ───
function renderDining(dh) {
  const el = document.getElementById('dining-content');
  if (!dh) { el.innerHTML = ''; return; }
  const nameCN = {
    'South Campus': 'South Campus 南校区食堂',
    'Yahentamitsi': 'Yahentamitsi 原住民文化食堂',
    '251 North': '251 North 北校区食堂',
  };
  el.innerHTML = `<div class="card"><h2>🍽️ 食堂 · Dining Halls</h2>
    <div class="week-label">📅 ${dh.week_of || ''}</div>
    ${dh.venues?.map(v => `
      <div class="venue"><h3>${nameCN[v.name] || v.name}</h3>
        ${renderSchedule(v.schedule)}
      </div>`).join('')}
    </div>`;
}

// ─── Cafes — IDEA Central first ───
function renderCafes(cf) {
  const el = document.getElementById('cafes-content');
  if (!cf) { el.innerHTML = ''; return; }

  // Sort: IDEA Central first, then others alphabetically
  const sorted = [...(cf.venues || [])].sort((a, b) => {
    if (a.name.includes('IDEA')) return -1;
    if (b.name.includes('IDEA')) return 1;
    return a.name.localeCompare(b.name);
  });

  let html = `<div class="card"><h2>☕ 咖啡厅 · Cafes</h2>
    <div class="week-label">📅 ${cf.week_of || ''}</div>`;

  sorted.forEach((v, i) => {
    const featured = v.name.includes('IDEA');
    html += `<div class="${featured ? 'venue featured' : 'venue'}">
      <h3>${featured ? '⭐ ' : ''}${v.name}</h3>`;
    const sched = v.schedule?.hours || v.schedule?.[''] || v.schedule;

    if (featured) {
      // Full meal-grid style for IDEA
      html += renderSchedule({ '营业 Hours': sched || {} });
    } else if (i > 2) {
      // Compact for others after first 3
      const firstVal = Object.values(sched || {})[0];
      const allSame = Object.values(sched || {}).every(d => d === firstVal);
      if (allSame) {
        const isClosed = !firstVal || firstVal.toLowerCase() === 'closed';
        html += `<span class="badge ${isClosed ? 'closed' : 'open'}">${isClosed ? '❌ 本周全关' : '✅ 每日 ' + firstVal}</span>`;
      } else {
        const dayCN = {Mon:'周一 Mon',Tue:'周二 Tue',Wed:'周三 Wed',Thu:'周四 Thu',Fri:'周五 Fri',Sat:'周六 Sat',Sun:'周日 Sun'};
        html += Object.entries(sched || {}).map(([day, val]) => {
          const isClosed = !val || val.toLowerCase() === 'closed';
          return `<span class="badge ${isClosed ? 'closed' : 'open'}">${dayCN[day]||day}: ${isClosed ? '❌' : '✅ '+val}</span> `;
        }).join('');
      }
    } else {
      html += renderSchedule({ '营业 Hours': sched || {} });
    }
    html += '</div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

// ─── Stamp ───
function renderStamp(st) {
  const el = document.getElementById('stamp-content');
  if (!st) { el.innerHTML = ''; return; }
  el.innerHTML = `<div class="card"><h2>🏛️ Stamp 学生中心 · Stamp Dining</h2>
    <div class="week-label">📅 ${st.week_of || ''}</div>
    ${st.venues?.map(v => `
      <div class="venue"><h3>${v.name}</h3>
        ${renderSchedule({ '营业 Hours': v.schedule?.hours || v.schedule?.[''] || v.schedule })}
      </div>`).join('')}
    </div>`;
}

// ─── Shared schedule renderer ───
function renderSchedule(schedule) {
  const meals = Object.entries(schedule || {});
  if (!meals.length) return '<p class="muted">暂无数据</p>';
  const mealCN = {
    'Breakfast': '🌅 早餐', 'Lunch': '☀️ 午餐', 'Dinner': '🌙 晚餐',
    '营业 Hours': '🕐 营业时间', 'hours': '🕐 营业时间',
    'Morning': '🌅 上午', 'Afternoon': '☀️ 下午', 'Evening': '🌙 晚上',
  };
  const dayCN = {Mon:'周一 Mon',Tue:'周二 Tue',Wed:'周三 Wed',Thu:'周四 Thu',Fri:'周五 Fri',Sat:'周六 Sat',Sun:'周日 Sun'};
  return `<div class="meal-grid">${meals.map(([meal, days]) => `
    <div class="meal-card">
      <div class="meal-title">${mealCN[meal] || meal}</div>
      <div class="meal-days">
        ${Object.entries(days).map(([day, val]) => {
          const isClosed = !val || val.toLowerCase() === 'closed';
          return `<div class="day-row">
            <span class="day-label">${dayCN[day] || day}</span>
            <span class="badge ${isClosed ? 'closed' : 'open'}">${isClosed ? '❌ Closed' : '✅ ' + val}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}</div>`;
}

loadData();
</script>
</body>
</html>
